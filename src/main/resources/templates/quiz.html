<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Quiz</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="/style.css"/>
    <script>
        function btnClick(btn, answer) {
            if (answer.correct) {
                btn.style.color = 'green';
                setTimeout(function() { window.location.reload(); }, 1000);
            } else {
                btn.style.color = 'red';
                btn.textContent = btn.textContent + " - " + btn.title;
                btn.disabled = true;
                fetch('/error?word=' + encodeURIComponent(answer.word))
            }
        }
    </script>
</head>
<body>
<div class="container">
    <nav class="nav">
        <a href="/">Меню</a>
        <a href="/quiz">Quiz</a>
        <a href="/words">Слова</a>
        <a href="/type-srb-ru">Srb → Ru</a>
        <a href="/type-ru-srb">Ru → Srb</a>
    </nav>
    <main class="card">
        <h1 class="prompt" th:text="${question.word}">Слово</h1>
        <div class="answers">
            <button th:each="answer: ${question.answersList}"
                    class="answer-btn"
                    th:text="${answer.word}"
                    th:onClick="btnClick(this, [[${answer}]])"
                    th:title="${answer.translate}">
            </button>
        </div>
    </main>
</div>
</body>
</html>
