<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Quiz</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="/style.css"/>
    <script>
        function btnClick(btn, answer) {
            if (answer.correct) {
                btn.style.color = 'green';
                setTimeout(function() { window.location.reload(); }, 1000);
            } else {
                btn.style.color = 'red';
                btn.textContent = btn.textContent + " - " + btn.title;
                btn.disabled = true;
            }
        }
        function deleteWord(word) {
            if (!confirm("Удалить «" + word + "» из словаря?")) return;
            fetch('/word?word=' + encodeURIComponent(word), { method: 'DELETE' })
                .then(function(response) {
                    if (response.ok) window.location.reload();
                    else alert("Не удалось удалить: " + response.status);
                });
        }
    </script>
</head>
<body>
<div class="container">
    <nav class="nav">
        <a href="/">Меню</a>
        <a href="/quiz">Quiz</a>
        <a href="/words">Слова</a>
        <a href="/type-srb-ru">Srb → Ru</a>
        <a href="/type-ru-srb">Ru → Srb</a>
    </nav>
    <main class="card">
        <h1 class="prompt" th:text="${question.word}">Слово</h1>
        <div class="answers">
            <button th:each="answer: ${question.answersList}"
                    class="answer-btn"
                    th:text="${answer.word}"
                    th:onClick="btnClick(this, [[${answer}]])"
                    th:title="${answer.translate}">
            </button>
        </div>
        <div class="skip-actions">
            <button type="button" class="skip-btn" onclick="window.location.reload()">
                <svg class="icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                    <path d="M21 3v5h-5"/>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                    <path d="M3 21v-5h5"/>
                </svg>
                Пропустить
            </button>
            <button type="button" class="skip-btn" th:onclick="deleteWord([[${question.word}]])">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 6h18"/>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                    <path d="M10 11v6"/>
                    <path d="M14 11v6"/>
                </svg>
                Знаю — удалить
            </button>
        </div>
    </main>
</div>
</body>
</html>
