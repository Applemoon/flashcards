<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Type</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="/style.css"/>
    <script th:inline="javascript">
        const WORD_RU = /*[[${wordRu}]]*/ '';

        function inputClick(input, translate) {
            if (event.key === 'Enter' && input.value.toLowerCase() === translate.toLowerCase()) {
                input.style.color = 'green';
                fetch('/answer?word=' + encodeURIComponent(WORD_RU) + '&correct=true',
                      { method: 'POST' });
                setTimeout(function() { window.location.reload(); }, 700);
            }
        };
    </script>
</head>
<body>
<div class="container">
    <nav class="nav">
        <a href="/">Меню</a>
        <a href="/quiz">Quiz</a>
        <a href="/type-srb-ru">Srb → Ru</a>
        <a href="/type-ru-srb">Ru → Srb</a>
        <a href="/words">Слова</a>
    </nav>
    <main class="type-card">
        <h1 class="type-prompt" th:text="${word}" th:title="${answer}">Слово</h1>
        <label class="type-label" for="input">Перевод</label>
        <input class="type-input" id="input" th:onkeydown="inputClick(this, [[${answer}]])" autocomplete="off" autofocus/>
        <div class="skip-actions">
            <button type="button" class="skip-btn" onclick="window.location.reload()">
                <svg class="icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                    <path d="M21 3v5h-5"/>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                    <path d="M3 21v-5h5"/>
                </svg>
                Пропустить
            </button>
        </div>
    </main>
</div>
</body>
</html>
